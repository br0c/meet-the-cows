name: Build data pack and deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "scripts/build_pack.py"
      - "scripts/smoke_test_pack.py"
      - "requirements.txt"
      - ".github/workflows/build-data-pack.yml"
      # Merging a community-contribution PR must rebuild + redeploy the pack.
      - "contributions/**"
  workflow_dispatch:
    inputs:
      force_full:
        description: "Rebuild everything, ignoring the incremental short-circuit"
        type: boolean
        default: true
  schedule:
    # Daily at 03:17 UTC (incremental Mon-Sat; full refresh on Sunday)
    - cron: "17 3 * * *"

permissions:
  contents: write  # push the updated translation cache back to main (see "Persist translation cache")
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PACK_ID: fr-alps
      PACK_NAME: France / Alps
      PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          # Ghostscript recompresses oversized chart/briefing PDFs (optimize_pdf_bytes).
          sudo apt-get install -y --no-install-recommends ghostscript

      - name: Unit tests (name/translation/incremental logic)
        run: python scripts/test_build_pack_fixes.py

      # Same gate as deploy-app.yml: this workflow also ships the app shell, so it must not
      # deploy a version whose APP_VERSIONs drifted or whose release note is missing.
      - name: Check APP_VERSION consistency and release note
        run: |
          app=$(grep -o "APP_VERSION = '[^']*'" src/app.js | head -1)
          sw=$(grep -o "APP_VERSION = '[^']*'" service-worker.js | head -1)
          [ -n "${app}" ] && [ "${app}" = "${sw}" ] || { echo "ERROR: APP_VERSION mismatch"; exit 1; }
          version=$(echo "${app}" | sed "s/.*'\(.*\)'/\1/")
          jq -e --arg v "${version}" '.[] | select(.version == $v)' release-notes.json > /dev/null \
            || { echo "ERROR: release-notes.json has no entry for ${version} — write the release note first"; exit 1; }
          echo "release note present for ${version}"

      # Incremental by default: the build short-circuits when the source fingerprint AND
      # PACK_SCHEMA_VERSION match the published state.json, so pushes/crons that change nothing
      # in the pack skip the rebuild+deploy. Full rebuild only on the Sunday weekly refresh
      # and on manual dispatch with force_full.
      # IMPORTANT: bump PACK_SCHEMA_VERSION in build_pack.py when a code change alters pack
      # output, otherwise a push may short-circuit and not deploy your change.
      - name: Decide build mode
        id: mode
        run: |
          FORCE=false
          case "${{ github.event_name }}" in
            workflow_dispatch) FORCE="${{ github.event.inputs.force_full }}" ;;
            schedule) [ "$(date -u +%u)" = "7" ] && FORCE=true ;;
          esac
          echo "force_full=${FORCE}" >> "$GITHUB_OUTPUT"
          echo "Build mode: force_full=${FORCE} (event=${{ github.event_name }})"

      # Persist translations so each build only pays DeepL for new/changed text. Three layers,
      # freshest first — the DeepL key is a capped lifetime quota, so losing this cache burns
      # quota that cannot be bought back:
      #   1. Actions cache (below): fast path, but evictable (7-day idle / 10 GB repo cap, under
      #      constant pressure from the multi-GB pages-pack-* entries saved each build).
      #   2. data/translation-cache.json in git: durable + versioned; committed back after each
      #      successful build ("Persist translation cache" step).
      #   3. translation-cache.json published next to each pack (self-heal in build_pack.py).
      - name: Restore translation cache
        uses: actions/cache@v6
        with:
          path: .cache/translation-cache.json
          key: translation-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            translation-cache-

      - name: Seed translation cache from repo copy (if CI cache evicted)
        run: |
          if [ ! -f .cache/translation-cache.json ] && [ -f data/translation-cache.json ]; then
            mkdir -p .cache
            cp data/translation-cache.json .cache/translation-cache.json
            echo "CI cache was evicted; seeded from data/translation-cache.json ($(wc -c < .cache/translation-cache.json) bytes)"
          fi

      # Italian charts sit behind ENAV's login, so they are fetched by a Playwright step and
      # handed to the build as a local directory (--it-vac-dir). The directory is cached across
      # runs: a browserless --check-only probe compares the portal's current AIRAC cycle against
      # the cached manifest, and when it matches, the Chromium install AND the ~250 downloads are
      # both skipped (the common nightly case). An ENAV outage must not sink the nightly build —
      # the fetch soft-fails and the build then runs without Italian charts (they return with
      # the next successful fetch).
      - name: Restore ENAV charts cache
        uses: actions/cache/restore@v6
        with:
          path: .cache/enav-charts
          key: enav-charts-${{ hashFiles('.cache/enav-charts/manifest.json') }}
          restore-keys: |
            enav-charts-

      - name: Fetch Italian charts (ENAV, authenticated)
        env:
          ENAV_ACCOUNT_ID: ${{ secrets.ENAV_ACCOUNT_ID }}
          ENAV_ACCOUNT_PASSWORD: ${{ secrets.ENAV_ACCOUNT_PASSWORD }}
        run: |
          python -m pip install --quiet playwright
          if python scripts/fetch_enav_charts.py --check-only --out .cache/enav-charts; then
            echo "ENAV cache is current for the portal's AIRAC cycle; skipping browser fetch."
          else
            python -m playwright install --with-deps chromium
            python scripts/fetch_enav_charts.py --out .cache/enav-charts \
              || echo "::warning::ENAV fetch failed; building without Italian charts"
          fi

      # Save keyed on the manifest hash: unchanged cycle -> same key -> no redundant multi-hundred-
      # megabyte cache entry each run (the old run_id key saved a new copy every night, evicting
      # the DeepL translation cache). A fresh fetch changes the manifest, producing a new key.
      - name: Save ENAV charts cache
        if: hashFiles('.cache/enav-charts/manifest.json') != ''
        uses: actions/cache/save@v6
        with:
          path: .cache/enav-charts
          key: enav-charts-${{ hashFiles('.cache/enav-charts/manifest.json') }}

      # All other source downloads (AT AIP ZIP, OpenAIP, the CUP guide, the DFS crawl, SIA PDFs)
      # share one on-disk cache (raw_dir) so a rebuild triggered by ONE
      # changed source does not re-fetch the rest. Restore the most recent copy; the build reuses
      # each artifact whose AIRAC cycle still matches and prunes the ones that have rolled.
      - name: Restore source download cache
        uses: actions/cache/restore@v6
        with:
          path: .cache/_multi/raw
          key: raw-src-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            raw-src-

      - name: Build data pack
        id: build
        env:
          OPENAIP_API_KEY: ${{ secrets.OPENAIP_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          # Lifetime (developer-tier) DeepL key: disable the per-build character cap so a full
          # rebuild — such as the schema bump that adds three-language notes — can finish
          # translating in one run instead of one 300k chunk per weekly full rebuild. The build
          # is still bounded by the remaining lifetime quota, and translations are cached, so
          # this is a one-time cost; routine incremental rebuilds spend almost nothing.
          DEEPL_MAX_CHARS: "0"
          # Incremental check + translation-cache self-heal read one pack's state; the fingerprint
          # is identical across packs, so any pack works. Use the France pack as the canonical one
          # (stable id — the Alps pack was split into alps-west/alps-east in schema 14).
          PACK_STATE_URL: ${{ env.PAGES_BASE_URL }}packs/fr/state.json
          FORCE_FULL: ${{ steps.mode.outputs.force_full }}
        run: |
          # Keep .cache/_multi/raw (the restored source-download cache); only the pack output
          # and the site staging are rebuilt from scratch each run.
          rm -rf data/packs dist/site

          # Multi-pack: one merged, translated build sliced into FR/CH/DE/IT/AT + Alps. Country
          # lists are forced to all build countries by --multi-pack, so they are not passed here.
          python scripts/build_pack.py \
            --multi-pack \
            --out data/packs \
            --cupx https://raw.githubusercontent.com/planeur-net/outlanding/main/guide_aires_securite.cupx \
            --champs-cupx https://raw.githubusercontent.com/planeur-net/outlanding/main/champs_des_alpes.cupx \
            --basulm-cupx https://raw.githubusercontent.com/planeur-net/outlanding/main/basulm_terrains.cupx \
            --airfield-source openaip \
            --vac-root auto \
            --vac-date auto \
            --at-vac-root auto \
            --de-vac-root auto \
            --it-vac-dir .cache/enav-charts \
            --include-vac-airfields

      # Keyed on the AIRAC-cycle markers (.source-versions.json), so unchanged cycles reuse the
      # same key and never re-store the ~450 MB AT ZIP; a cycle roll changes the hash and saves
      # the refreshed downloads once. Only on build success, so a partial/failed run cannot pin
      # the key with an incomplete cache.
      - name: Save source download cache
        if: success() && hashFiles('.cache/_multi/raw/.source-versions.json') != ''
        uses: actions/cache/save@v6
        with:
          path: .cache/_multi/raw
          key: raw-src-${{ hashFiles('.cache/_multi/raw/.source-versions.json') }}

      - name: No source changes (skipped rebuild)
        if: steps.build.outputs.changed == 'false'
        run: echo "No source changes since the last build; kept the existing deployed pack."

      - name: Smoke test packs
        if: steps.build.outputs.changed != 'false'
        run: |
          python scripts/smoke_test_pack.py data/packs/alps-west
          python scripts/smoke_test_pack.py data/packs/alps-east

      # Durable layer 2: commit the updated cache to the repo. Only fires when the build added
      # translations (git diff check), and the commit touches only data/translation-cache.json,
      # which matches no workflow's path filter — so it can never retrigger a build.
      - name: Persist translation cache to repo
        if: steps.build.outputs.changed != 'false'
        run: |
          [ -f .cache/translation-cache.json ] || { echo "no cache file produced; skipping"; exit 0; }
          cp .cache/translation-cache.json data/translation-cache.json
          git add data/translation-cache.json
          if git diff --cached --quiet; then
            echo "translation cache unchanged; nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Persist translation cache ($(python -c 'import json;print(len(json.load(open("data/translation-cache.json"))))') entries) [skip ci]"
          # The build can run for an hour+; rebase over anything pushed to main meanwhile.
          for i in 1 2 3; do
            git push origin HEAD:main && exit 0
            git pull --rebase origin main
          done
          git push origin HEAD:main

      - name: Cache generated data pack for app-only deploys
        if: steps.build.outputs.changed != 'false'
        uses: actions/cache/save@v6
        with:
          path: data/packs
          key: pages-pack-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Assemble Pages site
        if: steps.build.outputs.changed != 'false'
        run: |
          mkdir -p dist/site/packs

          cp index.html styles.css service-worker.js manifest.webmanifest release-notes.json dist/site/
          if [ -d icons ]; then cp -R icons dist/site/icons; fi
          mkdir -p dist/site/src
          cp src/app.js dist/site/src/app.js

          # Every pack dir + the shared media tree (_shared) + packs.json (written by the build).
          cp -R data/packs/. dist/site/packs/

          find dist/site -maxdepth 3 -type f | sort | head -80
          du -sh dist/site dist/site/packs

      - name: Setup Pages
        if: steps.build.outputs.changed != 'false'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: steps.build.outputs.changed != 'false'
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: dist/site

      - name: Deploy to GitHub Pages
        if: steps.build.outputs.changed != 'false'
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}

      - name: Show URL
        if: steps.build.outputs.changed != 'false'
        run: echo "Deployed to ${{ steps.deployment.outputs.page_url }}"

name: Build data pack and deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "scripts/build_pack.py"
      - "scripts/smoke_test_pack.py"
      - "requirements.txt"
      - ".github/workflows/build-data-pack.yml"
  workflow_dispatch:
    inputs:
      force_full:
        description: "Rebuild everything, ignoring the incremental short-circuit"
        type: boolean
        default: true
  schedule:
    # Daily at 03:17 UTC (incremental Mon-Sat; full refresh on Sunday)
    - cron: "17 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PACK_ID: fr-alps
      PACK_NAME: France / Alps
      PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Unit tests (name/translation/incremental logic)
        run: python scripts/test_build_pack_fixes.py

      # Full rebuild on code push (developer intent) and on the Sunday cron (weekly refresh
      # that catches same-year streckenflug edits). The Mon-Sat cron runs incrementally and
      # short-circuits when no source changed.
      - name: Decide build mode
        id: mode
        run: |
          FORCE=false
          case "${{ github.event_name }}" in
            push) FORCE=true ;;
            workflow_dispatch) FORCE="${{ github.event.inputs.force_full }}" ;;
            schedule) [ "$(date -u +%u)" = "7" ] && FORCE=true ;;
          esac
          echo "force_full=${FORCE}" >> "$GITHUB_OUTPUT"
          echo "Build mode: force_full=${FORCE} (event=${{ github.event_name }})"

      # Persist German->English translations so each build only pays DeepL for new/changed
      # text. Unique primary key => always saves the updated cache; restore-keys pulls the
      # most recent one from a previous run.
      - name: Restore translation cache
        uses: actions/cache@v4
        with:
          path: .cache/translation-cache.json
          key: translation-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            translation-cache-

      - name: Build data pack
        id: build
        env:
          OPENAIP_API_KEY: ${{ secrets.OPENAIP_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          PACK_STATE_URL: ${{ env.PAGES_BASE_URL }}packs/${{ env.PACK_ID }}/state.json
          FORCE_FULL: ${{ steps.mode.outputs.force_full }}
        run: |
          rm -rf "data/packs/${PACK_ID}" ".cache/${PACK_ID}" "dist/site"

          python scripts/build_pack.py \
            --cupx https://raw.githubusercontent.com/planeur-net/outlanding/main/guide_aires_securite.cupx \
            --pack-id "${PACK_ID}" \
            --pack-name "${PACK_NAME}" \
            --countries FR CH IT \
            --airfield-source openaip \
            --include-streckenflug \
            --streckenflug-countries FR CH IT \
            --streckenflug-workers 8 \
            --vac-root auto \
            --vac-date auto \
            --include-vac-airfields

      - name: No source changes (skipped rebuild)
        if: steps.build.outputs.changed == 'false'
        run: echo "No source changes since the last build; kept the existing deployed pack."

      - name: Smoke test pack
        if: steps.build.outputs.changed != 'false'
        run: python scripts/smoke_test_pack.py

      - name: Cache generated data pack for app-only deploys
        if: steps.build.outputs.changed != 'false'
        uses: actions/cache/save@v4
        with:
          path: data/packs/${{ env.PACK_ID }}
          key: pages-pack-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Assemble Pages site
        if: steps.build.outputs.changed != 'false'
        run: |
          mkdir -p dist/site/packs

          cp index.html styles.css service-worker.js manifest.webmanifest dist/site/
          if [ -d icons ]; then cp -R icons dist/site/icons; fi
          mkdir -p dist/site/src
          cp src/app.js dist/site/src/app.js

          cp -R "data/packs/${PACK_ID}" "dist/site/packs/${PACK_ID}"

          python scripts/make_pages_pack_index.py \
            --pack-id "${PACK_ID}" \
            --pack-name "${PACK_NAME}" \
            --output dist/site/packs/packs.json

          find dist/site -maxdepth 3 -type f | sort | head -80
          du -sh dist/site dist/site/packs dist/site/packs/${PACK_ID}

      - name: Setup Pages
        if: steps.build.outputs.changed != 'false'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.build.outputs.changed != 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_attempt }}
          path: dist/site

      - name: Deploy to GitHub Pages
        if: steps.build.outputs.changed != 'false'
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}

      - name: Show URL
        if: steps.build.outputs.changed != 'false'
        run: echo "Deployed to ${{ steps.deployment.outputs.page_url }}"

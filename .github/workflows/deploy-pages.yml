name: Deploy app and data pack to Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "manifest.webmanifest"
      - "service-worker.js"
      - "styles.css"
      - "src/**"
      - "icons/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  schedule:
    # Daily at 03:17 UTC
    - cron: "17 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-data-pack
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PACK_ID: fr-alps
      PACK_NAME: France / Alps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Build data pack
        env:
          OPENAIP_API_KEY: ${{ secrets.OPENAIP_API_KEY }}
        run: |
          rm -rf "data/packs/${PACK_ID}" ".cache/${PACK_ID}" "dist/site"

          python scripts/build_pack.py \
            --cupx https://raw.githubusercontent.com/planeur-net/outlanding/main/guide_aires_securite.cupx \
            --pack-id "${PACK_ID}" \
            --pack-name "${PACK_NAME}" \
            --countries FR CH IT \
            --airfield-source openaip \
            --include-streckenflug \
            --streckenflug-countries FR CH IT \
            --streckenflug-workers 8 \
            --vac-root auto \
            --vac-date auto \
            --include-vac-airfields

      - name: Smoke test pack
        run: python scripts/smoke_test_pack.py

      - name: Assemble Pages site
        run: |
          mkdir -p dist/site/packs

          cp index.html styles.css service-worker.js manifest.webmanifest dist/site/
          if [ -d icons ]; then cp -R icons dist/site/icons; fi
          mkdir -p dist/site/src
          cp src/app.js dist/site/src/app.js

          cp -R "data/packs/${PACK_ID}" "dist/site/packs/${PACK_ID}"

          python scripts/make_pages_pack_index.py \
            --pack-id "${PACK_ID}" \
            --pack-name "${PACK_NAME}" \
            --output dist/site/packs/packs.json

          find dist/site -maxdepth 3 -type f | sort | head -80
          du -sh dist/site dist/site/packs dist/site/packs/${PACK_ID}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show URL
        run: echo "Deployed to ${{ steps.deployment.outputs.page_url }}"

name: Deploy app to Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "manifest.webmanifest"
      - "service-worker.js"
      - "styles.css"
      - "release-notes.json"
      - "src/**"
      - "icons/**"
      - "scripts/fetch_pages_pack.py"
      - "scripts/make_pages_pack_index.py"
      - ".github/workflows/deploy-app.yml"
      - ".github/workflows/build-data-pack.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PACK_ID: fr-alps
      PACK_NAME: France / Alps
      PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # APP_VERSION is declared in both files (the SW cannot import the module); a mismatch
      # would leave clients on a stale shell cache. Fail fast instead of deploying drift.
      # Every release must also ship its release note: fail when release-notes.json has no
      # entry for the current APP_VERSION.
      - name: Check APP_VERSION consistency and release note
        run: |
          app=$(grep -o "APP_VERSION = '[^']*'" src/app.js | head -1)
          sw=$(grep -o "APP_VERSION = '[^']*'" service-worker.js | head -1)
          echo "src/app.js:        ${app}"
          echo "service-worker.js: ${sw}"
          [ -n "${app}" ] && [ "${app}" = "${sw}" ] || { echo "ERROR: APP_VERSION mismatch"; exit 1; }

          version=$(echo "${app}" | sed "s/.*'\(.*\)'/\1/")
          jq -e --arg v "${version}" '.[] | select(.version == $v)' release-notes.json > /dev/null \
            || { echo "ERROR: release-notes.json has no entry for ${version} — write the release note before deploying"; exit 1; }
          echo "release note present for ${version}"

      - name: Detect data-pack changes
        id: data_changes
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ -z "${before}" ] || [ "${before}" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            before="$(git rev-list --max-parents=0 HEAD)"
          fi

          git diff --name-only "${before}" "${{ github.sha }}" > changed-files.txt
          cat changed-files.txt

          if grep -Eq '^(scripts/build_pack\.py|scripts/smoke_test_pack\.py|requirements\.txt|\.github/workflows/build-data-pack\.yml)$' changed-files.txt; then
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip app deploy when data workflow is responsible
        if: steps.data_changes.outputs.data_changed == 'true'
        run: echo "Data-pack files changed; build-data-pack.yml will rebuild and deploy the complete site."

      - name: Restore latest generated data pack cache
        if: steps.data_changes.outputs.data_changed != 'true'
        uses: actions/cache/restore@v6
        with:
          path: data/packs
          key: pages-pack-${{ github.run_id }}
          restore-keys: |
            pages-pack-

      - name: Restore packs from current Pages deployment when cache is unavailable
        if: steps.data_changes.outputs.data_changed != 'true'
        run: |
          if [ -f "data/packs/packs.json" ]; then
            echo "Using cached data packs."
            exit 0
          fi

          # Fetches every pack listed in packs.json plus the shared media tree.
          python3 scripts/fetch_pages_pack.py \
            --base-url "${PAGES_BASE_URL}" \
            --output data/packs

      - name: Assemble Pages site
        if: steps.data_changes.outputs.data_changed != 'true'
        run: |
          mkdir -p dist/site/packs

          cp index.html styles.css service-worker.js manifest.webmanifest release-notes.json dist/site/
          if [ -d icons ]; then cp -R icons dist/site/icons; fi
          mkdir -p dist/site/src
          cp src/app.js dist/site/src/app.js

          # All pack dirs + shared media (_shared) + packs.json.
          cp -R data/packs/. dist/site/packs/

          find dist/site -maxdepth 3 -type f | sort | head -80
          du -sh dist/site dist/site/packs

      - name: Setup Pages
        if: steps.data_changes.outputs.data_changed != 'true'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: steps.data_changes.outputs.data_changed != 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: dist/site

      - name: Deploy to GitHub Pages
        if: steps.data_changes.outputs.data_changed != 'true'
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}

      - name: Show URL
        if: steps.data_changes.outputs.data_changed != 'true'
        run: echo "Deployed to ${{ steps.deployment.outputs.page_url }}"

name: Build data pack

on:
  workflow_dispatch:
    inputs:
      cupx_url:
        description: "CUPX URL"
        required: true
        default: "https://raw.githubusercontent.com/planeur-net/outlanding/main/guide_aires_securite.cupx"
      pack_id:
        description: "Pack ID"
        required: true
        default: "fr-alps"
      pack_name:
        description: "Pack name"
        required: true
        default: "France / Alps"
      countries:
        description: "OpenAIP countries to import"
        required: true
        default: "FR CH IT"
      include_vac_airfields:
        description: "Create VAC-only glider airfield entries"
        required: true
        default: "true"
      max_vac:
        description: "Limit successful VAC downloads for testing. Leave empty for full build."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: build-pack
  cancel-in-progress: false

jobs:
  build-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install pypdf
          fi

      - name: Build pack
        env:
          OPENAIP_API_KEY: ${{ secrets.OPENAIP_API_KEY }}
          SIA_VAC_ROOT: ${{ vars.SIA_VAC_ROOT }}
          SIA_VAC_DATE: ${{ vars.SIA_VAC_DATE }}
        run: |
          EXTRA_ARGS=""

          if [ "${{ inputs.include_vac_airfields }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --include-vac-airfields"
          fi

          if [ -n "${{ inputs.max_vac }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --max-vac ${{ inputs.max_vac }}"
          fi

          python scripts/build_pack.py \
            --cupx "${{ inputs.cupx_url }}" \
            --pack-id "${{ inputs.pack_id }}" \
            --pack-name "${{ inputs.pack_name }}" \
            --countries ${{ inputs.countries }} \
            --airfield-source openaip \
            --keep-raw \
            $EXTRA_ARGS

          python scripts/smoke_test_pack.py

      - name: Show generated pack size
        run: |
          du -sh data/packs || true
          find data/packs -type f | wc -l || true
          find data/packs -maxdepth 2 -name manifest.json -print -exec cat {} \;

      - name: Commit generated pack
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git status --short
          git add data/packs

          if git diff --cached --quiet; then
            echo "No pack changes to commit"
            exit 0
          fi

          git commit -m "Build ${{ inputs.pack_name }} pack"
          git pull --rebase origin main
          git push

# Cloudflare Worker: contribution intake for Meet the Cows.
# Deploy:  cd worker && npm install && npx wrangler deploy
# Secrets (never commit): npx wrangler secret put GITHUB_TOKEN
#                         npx wrangler secret put TURNSTILE_SECRET
name = "mtc-contrib-intake"
main = "src/index.js"
compatibility_date = "2024-11-01"

[vars]
REPO = "br0c/meet-the-cows"          # owner/repo the PR is opened against
BASE_BRANCH = "main"                 # branch PRs target
ALLOWED_ORIGIN = "https://br0c.github.io"   # CORS: the app's origin
GEO_RADIUS_M = "1000"                # within this of the field ⇒ geo-verified
MAX_PHOTO_BYTES = "15728640"         # 15 MB
MIN_PHOTO_LONG_EDGE = "2560"         # matches the pack image resize target
RELEASE_TAG = "contrib-originals"    # legacy release with pre-R2 photo originals (fallback path)
BACKUP_BRANCHES = "main,dev"         # branches the nightly repo snapshot covers

# Photo originals (originals/) + nightly repo snapshots (repo-backups/). The bucket stays
# PRIVATE: originals are served by this Worker's GET /originals/<key> route, and backups are
# not reachable from outside at all — no public bucket URL, no S3 credentials anywhere.
# The bucket must exist before deploying: R2 -> Create bucket -> "mtc-data".
[[r2_buckets]]
binding = "ORIGINALS"
bucket_name = "mtc-data"

[triggers]
crons = ["47 2 * * *"]               # nightly repo tarball snapshot into R2 (see backupRepo)
